# nginx/attendee.conf
# Copiar para /etc/nginx/sites-available/attendee no servidor
# e criar symlink em /etc/nginx/sites-enabled/attendee

server {
    listen 80;
    server_name bots.firstlineai.com.br;

    # Cloudflare já faz o redirect HTTP→HTTPS, mas mantemos aqui
    # para acessos diretos ao IP
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name bots.firstlineai.com.br;

    # Cloudflare Origin Certificate
    ssl_certificate     /etc/nginx/ssl/cf-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cf-origin.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Arquivos estáticos servidos diretamente pelo Nginx (bypassa gunicorn)
    location /static/ {
        alias /home/deploy/apps/attendee/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy para gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Necessário para uploads de arquivos maiores
        client_max_body_size 50M;
    }
}
